apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuelokbt-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vuelokbt
  template:
    metadata:
      labels:
        app: vuelokbt
    spec:
      containers:
        - name: vuelokbt-app
          image: vuelokbt-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8089
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/kbtvuelo"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: vuelokbt-service
spec:
  ports:
    - port: 8089
      targetPort: 8089
  selector:
    app: vuelokbt
  type: LoadBalancer